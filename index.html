<!DOCTYPE html>
<html lang="ja">
<head>

  <title>株式会社ニッチ</title>
  <style>
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Sans', 'Meiryo', sans-serif;
      margin: 0;
      background: #f5f7fa;
      color: #333;
    }
    header {
      background: #1a1a2e;
      color: #fff;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    header h1 {
      margin: 0;
      font-size: 1.6rem;
      flex: 1;
    }
    .logo {
      width: 60px;
      height: 60px;
    }
    nav a {
      color: #ccc;
      text-decoration: none;
      margin-left: 20px;
      font-size: 0.95rem;
    }
    nav a:hover {
      color: #fff;
    }
    nav a.active {
      color: #fff;
      font-weight: bold;
    }
    main {
      max-width: 800px;
      margin: 60px auto;
      padding: 0 20px;
    }
    h2 {
      font-size: 1.8rem;
      color: #1a1a2e;
      border-bottom: 3px solid #1a1a2e;
      padding-bottom: 10px;
      margin-bottom: 30px;
    }
    .hero {
      text-align: center;
      padding: 60px 20px;
    }
    .hero svg {
      width: 120px;
      height: 120px;
    }
    .hero p {
      font-size: 1.1rem;
      line-height: 1.8;
      color: #555;
      margin-top: 20px;
    }
    footer {
      text-align: center;
      padding: 30px;
      background: #1a1a2e;
      color: #aaa;
      font-size: 0.85rem;
      margin-top: 80px;
