      border-bottom: 3px solid #1a1a2e;
      padding-bottom: 10px;
      margin-bottom: 30px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);

    tr {

    tr:last-child {

    th {

      width: 180px;
