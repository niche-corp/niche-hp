<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>お問い合わせ | 株式会社ニッチ</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      color: #333;
    }
    header {
      background: #222;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      margin: 0;
      font-size: 1.2rem;
    }
    nav a {
      color: #fff;
      text-decoration: none;
      margin-left: 20px;
    }
    nav a:hover {
      text-decoration: underline;
    }
    main {
      max-width: 640px;
      margin: 48px auto;
      padding: 0 16px;
    }
    h2 {
      font-size: 1.5rem;
      margin-bottom: 24px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
    }
    .required {
      color: #e00;
      margin-left: 4px;
      font-size: 0.85rem;
    }
    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 1rem;
      box-sizing: border-box;
    }
    textarea {
      height: 160px;
      resize: vertical;
    }
    button[type="submit"] {
      background: #222;
      color: #fff;
      border: none;
      padding: 12px 32px;
      font-size: 1rem;
      border-radius: 4px;
      cursor: pointer;
    }
    button[type="submit"]:hover {
      background: #444;
    }
    footer {
      text-align: center;
      padding: 24px;
      font-size: 0.85rem;
      color: #888;
      border-top: 1px solid #eee;
      margin-top: 64px;
    }
  </style>
</head>
<body>
  <header>
    <h1>株式会社ニッチ</h1>
    <nav>
      <a href="index.html">トップ</a>
      <a href="#">会社概要</a>
      <a href="contact.html">お問い合わせ</a>
    </nav>
  </header>

  <main>
    <h2>お問い合わせ</h2>
    <p>以下のフォームに必要事項をご入力のうえ、送信してください。</p>

    <form action="#" method="post">
      <div class="form-group">
        <label for="name">お名前<span class="required">必須</span></label>
        <input type="text" id="name" name="name" placeholder="例：山田 太郎" required>
      </div>

      <div class="form-group">
        <label for="email">メールアドレス<span class="required">必須</span></label>
        <input type="email" id="email" name="email" placeholder="例：taro@example.com" required>
      </div>

      <div class="form-group">
        <label for="subject">件名</label>
        <input type="text" id="subject" name="subject" placeholder="例：商品について">
      </div>

      <div class="form-group">
        <label for="message">お問い合わせ内容<span class="required">必須</span></label>
        <textarea id="message" name="message" placeholder="お問い合わせ内容をご記入ください。" required></textarea>
      </div>

      <button type="submit">送信する</button>
    </form>
  </main>

  <footer>
    <p>&copy; 株式会社ニッチ</p>
  </footer>
</body>
</html>
