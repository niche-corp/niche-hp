<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | 株式会社ニッチ</title>
  <style>
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Sans', 'Meiryo', sans-serif;
      margin: 0;
      background: #f5f7fa;
      color: #333;
    }
    header {
      background: #1a1a2e;
      color: #fff;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    header h1 {
      margin: 0;
      font-size: 1.6rem;
      flex: 1;
    }
    .logo {
      width: 60px;
      height: 60px;
    }
    nav a {
      color: #ccc;
      text-decoration: none;
      margin-left: 20px;
      font-size: 0.95rem;
    }
    nav a:hover {
      color: #fff;
    }
    nav a.active {
      color: #fff;
      font-weight: bold;
    }
    main {
      max-width: 800px;
      margin: 60px auto;
      padding: 0 20px;
    }
    h2 {
      font-size: 1.8rem;
      color: #1a1a2e;
      border-bottom: 3px solid #1a1a2e;
      padding-bottom: 10px;
      margin-bottom: 30px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
    }
    .required {
      color: #e00;
      margin-left: 4px;
      font-size: 0.85rem;
    }
    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 1rem;
      box-sizing: border-box;
      font-family: inherit;
    }
    input[type="text"]:focus,
    input[type="email"]:focus,
    textarea:focus {
      outline: none;
      border-color: #1a1a2e;
      box-shadow: 0 0 0 2px rgba(26,26,46,0.15);
    }
    textarea {
      height: 160px;
      resize: vertical;
    }
    button[type="submit"] {
      background: #1a1a2e;
      color: #fff;
      border: none;
      padding: 12px 32px;
      font-size: 1rem;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
    }
    button[type="submit"]:hover {
      background: #2e2e50;
    }
    footer {
      text-align: center;
      padding: 30px;
      background: #1a1a2e;
      color: #aaa;
      font-size: 0.85rem;
      margin-top: 80px;
    }
  </style>
</head>
<body>
  <header>
    <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="50" cy="62" rx="28" ry="32" fill="#1a1a2e"/>
      <ellipse cx="50" cy="68" rx="16" ry="22" fill="#fff"/>
      <ellipse cx="50" cy="30" rx="20" ry="20" fill="#1a1a2e"/>
      <circle cx="43" cy="26" r="4" fill="#fff"/>
      <circle cx="57" cy="26" r="4" fill="#fff"/>
      <circle cx="44" cy="26" r="2" fill="#1a1a2e"/>
      <circle cx="58" cy="26" r="2" fill="#1a1a2e"/>
      <polygon points="50,33 44,38 56,38" fill="#f4a300"/>
      <ellipse cx="22" cy="62" rx="10" ry="18" fill="#1a1a2e" transform="rotate(-15 22 62)"/>
      <ellipse cx="78" cy="62" rx="10" ry="18" fill="#1a1a2e" transform="rotate(15 78 62)"/>
      <ellipse cx="42" cy="92" rx="10" ry="5" fill="#f4a300"/>
      <ellipse cx="58" cy="92" rx="10" ry="5" fill="#f4a300"/>
    </svg>
    <h1>株式会社ニッチ</h1>
    <nav>
      <a href="index.html">トップ</a>
      <a href="aboutcompany.html">会社概要</a>
      <a href="#" class="active">お問い合わせ</a>
    </nav>
  </header>

  <main>
    <h2>お問い合わせ</h2>
    <p>以下のフォームに必要事項をご入力のうえ、送信してください。</p>

    <form action="#" method="post">
      <div class="form-group">
        <label for="name">お名前<span class="required">必須</span></label>
        <input type="text" id="name" name="name" placeholder="例：山田 太郎" required>
      </div>

      <div class="form-group">
        <label for="email">メールアドレス<span class="required">必須</span></label>
        <input type="email" id="email" name="email" placeholder="例：taro@example.com" required>
      </div>

      <div class="form-group">
        <label for="subject">件名</label>
        <input type="text" id="subject" name="subject" placeholder="例：商品について">
      </div>

      <div class="form-group">
        <label for="message">お問い合わせ内容<span class="required">必須</span></label>
        <textarea id="message" name="message" placeholder="お問い合わせ内容をご記入ください。" required></textarea>
      </div>

      <button type="submit">送信する</button>
    </form>
  </main>

  <footer>
    <p>&copy; 株式会社ニッチ</p>
  </footer>
</body>
</html>
